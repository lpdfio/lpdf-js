name: Release
run-name: "Release ${{ github.event.client_payload.version || github.ref_name }} to npm (${{ github.event_name == 'repository_dispatch' && 'core' || 'adapter' }})"

on:
  repository_dispatch:
    types: [core-release]
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      # ── Resolve version ──────────────────────────────────────────────────────
      # When triggered by core dispatch: use payload version.
      # When triggered by a direct adapter tag: derive core version (strip patch → .0).
      - name: Resolve version
        run: |
          ADAPTER_TAG="${{ github.event.client_payload.version || github.ref_name }}"
          CORE_TAG=$(echo "$ADAPTER_TAG" | sed 's/\.[0-9]*$/.0/')
          VERSION="${ADAPTER_TAG#v}"
          echo "ADAPTER_TAG=$ADAPTER_TAG"   >> "$GITHUB_ENV"
          echo "CORE_TAG=$CORE_TAG"         >> "$GITHUB_ENV"
          echo "VERSION=$VERSION"           >> "$GITHUB_ENV"

      # ── Download wasm-pack artifacts from core release ───────────────────────
      - name: Download wasm-pack artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p wasm
          for attempt in 1 2 3; do
            gh release download "$CORE_TAG" \
              --repo lpdfio/lpdf \
              --pattern "lpdf.js" \
              --pattern "lpdf_bg.wasm" \
              --pattern "lpdf-web.js" \
              --dir wasm \
              --clobber && break
            echo "Attempt $attempt failed — retrying in 10s..."
            sleep 10
          done
          # Fallback to latest release when the derived tag doesn't exist yet
          if [ ! -f wasm/lpdf.js ]; then
            gh release download \
              --repo lpdfio/lpdf \
              --pattern "lpdf.js" \
              --pattern "lpdf_bg.wasm" \
              --pattern "lpdf-web.js" \
              --dir wasm \
              --clobber
          fi

      # ── Build ────────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install and build
        run: npm ci && npm run build

      # ── Fetch test fixtures and snapshots from core ──────────────────────────
      # The fixture XML files and golden SHA-256 snapshots live in the core
      # monorepo (lpdfio/lpdf).  Sparse-clone only those two directories so
      # that snapshot tests can actually run in this adapter's CI.
      - name: Fetch test fixtures and snapshots from core
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/lpdfio/lpdf.git _core
          git -C _core sparse-checkout set test/fixtures test/snapshots
          mkdir -p test/fixtures test/snapshots
          cp -r _core/test/fixtures/. test/fixtures/
          cp -r _core/test/snapshots/. test/snapshots/
          rm -rf _core

      # ── Test ─────────────────────────────────────────────────────────────────
      - name: Test
        run: npm test

      # ── Set package version ──────────────────────────────────────────────────
      - name: Bump package version
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      # ── Publish to npm ───────────────────────────────────────────────────────
      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Create GitHub Release (core-triggered only) ──────────────────────────
      - name: Create GitHub Release
        if: github.event_name == 'repository_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag "$ADAPTER_TAG"
          git push origin "$ADAPTER_TAG"
          gh release create "$ADAPTER_TAG" \
            --title "$ADAPTER_TAG" \
            --generate-notes
