name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      # ── Download wasm-pack artifacts ─────────────────────────────────────────
      # Derives the core tag from package.json (strip patch → .0).
      # Falls back to the latest release when the version is a placeholder (0.0.0)
      # or the derived tag does not yet exist.
      - name: Download wasm artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p wasm
          PKG_VERSION=$(node -p "require('./package.json').version")
          CORE_TAG="v$(echo "$PKG_VERSION" | sed 's/\.[0-9]*$/.0/')"
          echo "Resolved core tag: $CORE_TAG"
          gh release download "$CORE_TAG" \
            --repo lpdfio/lpdf \
            --pattern "lpdf.js" \
            --pattern "lpdf_bg.wasm" \
            --dir wasm \
          || gh release download \
            --repo lpdfio/lpdf \
            --pattern "lpdf.js" \
            --pattern "lpdf_bg.wasm" \
            --dir wasm

      - run: npm ci
      - run: npm run build
      - run: npm test
